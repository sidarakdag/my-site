// ── Helpers ────────────────────────────────────────────────────────────────
const PI=Math.PI, TAU=PI*2, D2R=PI/180;
function wpick(arr){let r=Math.random()*arr.reduce((s,x)=>s+x.w,0);for(const x of arr){r-=x.w;if(r<=0)return x;}return arr[arr.length-1];}
function slerp3(a,b,t){
  const d=Math.min(1,Math.max(-1,a[0]*b[0]+a[1]*b[1]+a[2]*b[2]));
  const th=Math.acos(d);if(th<1e-6)return[...a];
  const s=Math.sin(th),s1=Math.sin((1-t)*th)/s,s2=Math.sin(t*th)/s;
  return[s1*a[0]+s2*b[0],s1*a[1]+s2*b[1],s1*a[2]+s2*b[2]];
}
function ll2v(lat,lng){const la=lat*D2R,lo=lng*D2R;return[Math.cos(la)*Math.cos(lo),Math.sin(la),Math.cos(la)*Math.sin(lo)];}
function v2ll(v){
  const lat=Math.asin(Math.max(-1,Math.min(1,v[1])))/D2R;
  const lng=Math.atan2(v[2],v[0])/D2R;
  return{lat,lng};
}
function h2rgb(h){const m=h.match(/^#([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:[255,255,255];}

// ── Canvas ─────────────────────────────────────────────────────────────────
const cv=document.getElementById('cv');
const cx2=cv.getContext('2d');
let W,H,R,dpr,STARS=[];
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx2.setTransform(dpr,0,0,dpr,0,0);
  R=Math.min(W,H)*0.39;
  genStars();
}
resize();
window.addEventListener('resize',resize);

// ── Stars ─────────────────────────────────────────────────────────────────
function genStars(){
  const n=Math.min(420,Math.floor(W*H/2800)+160);
  STARS=Array.from({length:n},()=>{
    const bright=Math.random()<.08,giant=Math.random()<.025;
    return{x:Math.random(),y:Math.random(),
      r:giant?2.2+Math.random()*1.1:bright?1.0+Math.random()*.7:.35+Math.random()*.55,
      a:giant?.55+Math.random()*.4:bright?.25+Math.random()*.5:.07+Math.random()*.3,
      tw:Math.random()*TAU,tws:.25+Math.random()*1.4,
      col:Math.random()<.12?'#aac8ff':Math.random()<.04?'#ffe0a0':'#ffffff'};
  });
}

// ── Projection ─────────────────────────────────────────────────────────────
let lon0=18,lat0=0; // center longitude + vertical tilt

function proj(lat,lng){
  const la=lat*D2R;
  const dlo=((lng-lon0+540)%360-180)*D2R;
  // Post-Y-rotation components
  const xr=Math.cos(la)*Math.sin(dlo);
  const yr=Math.sin(la);
  const zr=Math.cos(la)*Math.cos(dlo);
  // Apply X-axis tilt by lat0
  const lt=lat0*D2R;
  const sx=xr;
  const sy=yr*Math.cos(lt)-zr*Math.sin(lt);
  const sz=yr*Math.sin(lt)+zr*Math.cos(lt);
  return{px:W/2+sx*R,py:H/2-sy*R,vis:sz>-0.05};
}
function vproj(v){const {lat,lng}=v2ll(v);return proj(lat,lng);}
function slerpH(a,b,t){const v=slerp3(a,b,t);const e=1+0.42*Math.sin(t*PI);return[v[0]*e,v[1]*e,v[2]*e];}
function vprojH(v){
  const mag=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
  const n=[v[0]/mag,v[1]/mag,v[2]/mag];
  const{lat,lng}=v2ll(n);
  const la=lat*D2R,dlo=((lng-lon0+540)%360-180)*D2R;
  const xr=Math.cos(la)*Math.sin(dlo),yr=Math.sin(la),zr=Math.cos(la)*Math.cos(dlo);
  const lt=lat0*D2R,sx=xr,sy=yr*Math.cos(lt)-zr*Math.sin(lt),sz=yr*Math.sin(lt)+zr*Math.cos(lt);
  return{px:W/2+sx*R*mag,py:H/2-sy*R*mag,vis:sz>-0.05};
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function drawGlobe(){
  // Wide outer corona
  const corona=cx2.createRadialGradient(W/2,H/2,R*.65,W/2,H/2,R*2.2);
  corona.addColorStop(0,'rgba(0,80,255,.0)');
  corona.addColorStop(.12,'rgba(10,60,220,.22)');
  corona.addColorStop(.3,'rgba(5,30,130,.12)');
  corona.addColorStop(.6,'rgba(0,10,60,.05)');
  corona.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=corona;cx2.beginPath();cx2.arc(W/2,H/2,R*2.1,0,TAU);cx2.fill();
  // Inner atmosphere limb (cyan-blue glow at edge)
  const atm=cx2.createRadialGradient(W/2,H/2,R*.79,W/2,H/2,R*1.22);
  atm.addColorStop(0,'rgba(0,120,255,.0)');
  atm.addColorStop(.55,'rgba(20,110,255,.2)');
  atm.addColorStop(.82,'rgba(0,200,255,.32)');
  atm.addColorStop(1,'rgba(0,80,200,.0)');
  cx2.fillStyle=atm;cx2.beginPath();cx2.arc(W/2,H/2,R*1.22,0,TAU);cx2.fill();
  // Globe sphere fill — off-center highlight for 3D depth
  const sg=cx2.createRadialGradient(W/2-R*.32,H/2-R*.32,R*.02,W/2+R*.08,H/2+R*.08,R*1.08);
  sg.addColorStop(0,'#0f2a4e');sg.addColorStop(.3,'#071a34');sg.addColorStop(.68,'#040f22');sg.addColorStop(1,'#020810');
  cx2.fillStyle=sg;cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.fill();
}

// ── Countries ──────────────────────────────────────────────────────────────
let geoFeatures=null;
(async function loadGeo(){
  try{
    const [,data]=await Promise.all([
      new Promise(res=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';s.onload=s.onerror=res;document.head.appendChild(s);}),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json())
    ]);
    if(typeof topojson!=='undefined') geoFeatures=topojson.feature(data,data.objects.countries).features;
  }catch(e){}
})();

function drawCountries(){
  if(!geoFeatures)return;
  cx2.save();
  cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.clip();
  // Land fill
  cx2.fillStyle='rgba(10,55,80,0.28)';
  for(const f of geoFeatures){
    if(!f.geometry)continue;
    const polys=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.type==='MultiPolygon'?f.geometry.coordinates:[];
    for(const poly of polys){
      cx2.beginPath();
      for(const ring of poly){
        let on=false;
        for(const[lng,lat]of ring){
          const p=proj(lat,lng);
          if(p.vis){if(!on){cx2.moveTo(p.px,p.py);on=true;}else cx2.lineTo(p.px,p.py);}
          else if(on){cx2.closePath();on=false;}
        }
        if(on)cx2.closePath();
      }
      cx2.fill('evenodd');
    }
  }
  // Border strokes
  cx2.strokeStyle='rgba(50,150,230,0.38)';cx2.lineWidth=0.7;
  for(const f of geoFeatures){
    if(!f.geometry)continue;
    const polys=f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.type==='MultiPolygon'?f.geometry.coordinates:[];
    for(const poly of polys){
      for(const ring of poly){
        let on=false;cx2.beginPath();
        for(const[lng,lat]of ring){
          const p=proj(lat,lng);
          if(p.vis){if(!on){cx2.moveTo(p.px,p.py);on=true;}else cx2.lineTo(p.px,p.py);}
          else if(on){cx2.stroke();cx2.beginPath();on=false;}
        }
        if(on)cx2.stroke();
      }
    }
  }
  cx2.restore();
}

function drawGrid(){
  cx2.save();
  cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.clip();
  cx2.strokeStyle='rgba(40,110,220,0.11)';cx2.lineWidth=0.7;
  const STEPS=90;
  // Latitude lines
  for(let lat=-60;lat<=60;lat+=30){
    let on=false;cx2.beginPath();
    for(let i=0;i<=STEPS;i++){const p=proj(lat,-180+(360/STEPS)*i);if(p.vis){if(!on){cx2.moveTo(p.px,p.py);on=true;}else cx2.lineTo(p.px,p.py);}else if(on){cx2.stroke();cx2.beginPath();on=false;}}
    if(on)cx2.stroke();
  }
  // Longitude lines
  for(let lng=0;lng<360;lng+=30){
    let on=false;cx2.beginPath();
    for(let i=0;i<=STEPS;i++){const p=proj(-90+(180/STEPS)*i,lng);if(p.vis){if(!on){cx2.moveTo(p.px,p.py);on=true;}else cx2.lineTo(p.px,p.py);}else if(on){cx2.stroke();cx2.beginPath();on=false;}}
    if(on)cx2.stroke();
  }
  cx2.restore();
}

function drawScan(now){
  cx2.save();
  const angle=now*0.00018%TAU;
  const WAKE=PI/5;
  cx2.globalCompositeOperation='lighter';
  for(let i=0;i<22;i++){
    const a=angle-(WAKE*i/22);
    const t=1-i/22;
    cx2.strokeStyle=`rgba(0,210,90,${(0.022*t*t).toFixed(4)})`;
    cx2.lineWidth=R/7;
    cx2.beginPath();cx2.moveTo(W/2,H/2);cx2.lineTo(W/2+Math.cos(a)*R,H/2+Math.sin(a)*R);cx2.stroke();
  }
  cx2.shadowColor='rgba(0,255,80,.9)';cx2.shadowBlur=9;
  cx2.strokeStyle='rgba(0,255,100,.5)';cx2.lineWidth=1;
  cx2.beginPath();cx2.moveTo(W/2,H/2);cx2.lineTo(W/2+Math.cos(angle)*R,H/2+Math.sin(angle)*R);cx2.stroke();
  cx2.restore();
}

function drawCities(now){
  cx2.save();
  cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.clip();
  cx2.globalCompositeOperation='lighter';
  for(const c of SOURCES){
    const p=proj(c.lat,c.lng);if(!p.vis)continue;
    const sz=1.4+c.w*.04;
    // Pulsing rings
    for(let ri=0;ri<2;ri++){
      const ph=(now*0.0017+ri*PI+c.lat*.08)%TAU;
      const sp=Math.max(0,Math.sin(ph));
      const rr=sp*9;
      const al=(1-rr/9)*0.28*sp;
      if(al>0.005){
        cx2.beginPath();cx2.arc(p.px,p.py,rr,0,TAU);
        cx2.strokeStyle=`rgba(239,68,68,${al.toFixed(3)})`;
        cx2.lineWidth=0.9;cx2.stroke();
      }
    }
    // Core glow
    const sg=cx2.createRadialGradient(p.px,p.py,0,p.px,p.py,sz*5.5);
    sg.addColorStop(0,`rgba(239,68,68,${(.22+c.w*.014).toFixed(3)})`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    cx2.fillStyle=sg;cx2.beginPath();cx2.arc(p.px,p.py,sz*5.5,0,TAU);cx2.fill();
    cx2.fillStyle=`rgba(255,130,130,${(.58+c.w*.02).toFixed(3)})`;
    cx2.beginPath();cx2.arc(p.px,p.py,sz,0,TAU);cx2.fill();
  }
  for(const c of TARGETS){
    const p=proj(c.lat,c.lng);if(!p.vis)continue;
    const sz=1.5+c.w*.05;
    // Pulsing ring
    const ph=(now*0.0021+c.lng*.05)%TAU;
    const sp=Math.max(0,Math.sin(ph));
    const rr=sp*11;
    const al=(1-rr/11)*0.22*sp;
    if(al>0.005){
      cx2.beginPath();cx2.arc(p.px,p.py,rr,0,TAU);
      cx2.strokeStyle=`rgba(59,130,246,${al.toFixed(3)})`;
      cx2.lineWidth=1;cx2.stroke();
    }
    // Core glow
    const sg=cx2.createRadialGradient(p.px,p.py,0,p.px,p.py,sz*5.5);
    sg.addColorStop(0,`rgba(59,130,246,${(.22+c.w*.016).toFixed(3)})`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    cx2.fillStyle=sg;cx2.beginPath();cx2.arc(p.px,p.py,sz*5.5,0,TAU);cx2.fill();
    cx2.fillStyle=`rgba(120,180,255,${(.56+c.w*.02).toFixed(3)})`;
    cx2.beginPath();cx2.arc(p.px,p.py,sz,0,TAU);cx2.fill();
  }
  cx2.globalCompositeOperation='source-over';
  cx2.restore();
}

// ── Arcs ───────────────────────────────────────────────────────────────────
let arcs=[];let arcId=0;
const isMob=W<768;
const MAX_ARCS=isMob?6:14;
const ARC_DUR=()=>2800+Math.random()*2200;

function spawnArc(){
  const src=wpick(SOURCES);
  let dst=wpick(TARGETS),t=0;while(dst.country===src.country&&t++<8)dst=wpick(TARGETS);
  const type=wpick(ATYPES);
  const jit=()=>(Math.random()-0.5)*1.2;
  const id=++arcId;
  const arc={id,
    srcLat:src.lat+jit(),srcLng:src.lng+jit(),
    dstLat:dst.lat+jit(),dstLng:dst.lng+jit(),
    color:type.color,name:type.name,
    srcCity:src.city,srcCountry:src.country,
    dstCity:dst.city,dstCountry:dst.country,
    v1:ll2v(src.lat+jit(),src.lng+jit()),
    v2:ll2v(dst.lat+jit(),dst.lng+jit()),
    progress:0,dur:ARC_DUR(),start:performance.now(),done:false,
  };
  arcs.push(arc);
  addFeed(arc);
}

function updateArcs(now){
  for(const a of arcs){
    const prev=a.progress;
    a.progress=Math.min(2,(now-a.start)/a.dur);
    if(prev<1&&a.progress>=1){addRing(a.dstLat,a.dstLng,a.color);addParticles(a.dstLat,a.dstLng,a.color);}
  }
  arcs=arcs.filter(a=>a.progress<2);
}

function drawArcs(){
  cx2.save();
  cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.clip();
  const STEPS=60,TRAIL=22;
  for(const a of arcs){
    const p=Math.min(a.progress,1);
    const fade=a.progress<1?1:Math.max(0,(2-a.progress)*1.5);
    if(fade<=0)continue;
    const headIdx=Math.floor(p*STEPS);
    const tailIdx=Math.max(0,headIdx-TRAIL);
    if(headIdx<=tailIdx)continue;
    const[r,g,b]=h2rgb(a.color);
    // Precompute projected points once
    const pts=[];
    for(let i=tailIdx;i<=headIdx;i++)pts.push(vprojH(slerpH(a.v1,a.v2,i/STEPS)));
    const n=pts.length;
    // Pass 1: wide outer bloom (additive)
    cx2.globalCompositeOperation='lighter';
    cx2.lineWidth=13;
    for(let i=0;i<n-1;i++){
      const pa=pts[i],pb=pts[i+1];
      if(!pa.vis||!pb.vis)continue;
      const seg=i/(n-1);
      cx2.beginPath();cx2.moveTo(pa.px,pa.py);cx2.lineTo(pb.px,pb.py);
      cx2.strokeStyle=`rgba(${r},${g},${b},${(seg*fade*.045).toFixed(3)})`;
      cx2.stroke();
    }
    // Pass 2: medium glow (additive)
    cx2.lineWidth=4.5;
    for(let i=0;i<n-1;i++){
      const pa=pts[i],pb=pts[i+1];
      if(!pa.vis||!pb.vis)continue;
      const seg=i/(n-1);
      cx2.beginPath();cx2.moveTo(pa.px,pa.py);cx2.lineTo(pb.px,pb.py);
      cx2.strokeStyle=`rgba(${r},${g},${b},${(seg*fade*.13).toFixed(3)})`;
      cx2.stroke();
    }
    // Pass 3: core line (normal composite)
    cx2.globalCompositeOperation='source-over';
    for(let i=0;i<n-1;i++){
      const pa=pts[i],pb=pts[i+1];
      if(!pa.vis||!pb.vis)continue;
      const seg=i/(n-1);
      cx2.lineWidth=0.7+seg*1.5;
      cx2.beginPath();cx2.moveTo(pa.px,pa.py);cx2.lineTo(pb.px,pb.py);
      cx2.strokeStyle=`rgba(${r},${g},${b},${Math.min(.9,seg*fade*1.15).toFixed(3)})`;
      cx2.stroke();
    }
    // Head glow (additive radial)
    if(a.progress<1){
      const hp=pts[n-1];
      if(hp&&hp.vis){
        cx2.globalCompositeOperation='lighter';
        const hg=cx2.createRadialGradient(hp.px,hp.py,0,hp.px,hp.py,16);
        hg.addColorStop(0,`rgba(${r},${g},${b},.4)`);
        hg.addColorStop(.35,`rgba(${r},${g},${b},.12)`);
        hg.addColorStop(1,'rgba(0,0,0,0)');
        cx2.fillStyle=hg;cx2.beginPath();cx2.arc(hp.px,hp.py,16,0,TAU);cx2.fill();
        const hg2=cx2.createRadialGradient(hp.px,hp.py,0,hp.px,hp.py,6);
        hg2.addColorStop(0,'rgba(255,255,255,.78)');
        hg2.addColorStop(.4,`rgba(${r},${g},${b},.45)`);
        hg2.addColorStop(1,'rgba(0,0,0,0)');
        cx2.fillStyle=hg2;cx2.beginPath();cx2.arc(hp.px,hp.py,6,0,TAU);cx2.fill();
      }
    }
  }
  cx2.globalCompositeOperation='source-over';
  cx2.restore();
}

// ── Rings ──────────────────────────────────────────────────────────────────
let rings=[];
function addRing(lat,lng,color){rings.push({lat,lng,color,start:performance.now()});}
function updateRings(now){rings=rings.filter(r=>(now-r.start)<1800);}
function drawRings(){
  cx2.save();cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.clip();
  const now=performance.now();
  for(const ring of rings){
    const prog=(now-ring.start)/1800;
    if(prog>=1)continue;
    const p=proj(ring.lat,ring.lng);if(!p.vis)continue;
    const[rv,gv,bv]=h2rgb(ring.color);
    cx2.globalCompositeOperation='lighter';
    // Impact flash
    if(prog<.3){
      const fl=(0.3-prog)/.3;
      const fg=cx2.createRadialGradient(p.px,p.py,0,p.px,p.py,R*.06*fl);
      fg.addColorStop(0,`rgba(255,255,255,${(fl*.55).toFixed(3)})`);
      fg.addColorStop(.35,`rgba(${rv},${gv},${bv},${(fl*.28).toFixed(3)})`);
      fg.addColorStop(1,'rgba(0,0,0,0)');
      cx2.fillStyle=fg;cx2.beginPath();cx2.arc(p.px,p.py,R*.06*fl,0,TAU);cx2.fill();
    }
    // Primary expanding ring
    const rr=prog*R*.14;
    cx2.beginPath();cx2.arc(p.px,p.py,rr,0,TAU);
    cx2.strokeStyle=`rgba(${rv},${gv},${bv},${((1-prog)*.6).toFixed(3)})`;
    cx2.lineWidth=1.4*(1-prog*.4);cx2.stroke();
    // Secondary faster ring
    const prog2=Math.min(prog*1.8,1),al2=(1-prog2)*.35;
    if(al2>0){
      cx2.beginPath();cx2.arc(p.px,p.py,prog2*R*.14,0,TAU);
      cx2.strokeStyle=`rgba(${rv},${gv},${bv},${al2.toFixed(3)})`;
      cx2.lineWidth=.7;cx2.stroke();
    }
    cx2.globalCompositeOperation='source-over';
  }
  cx2.restore();
}

// ── Particles ──────────────────────────────────────────────────────────────
let particles=[];
function addParticles(lat,lng,color){
  const p=proj(lat,lng);if(!p.vis)return;
  const[r,g,b]=h2rgb(color);
  for(let i=0;i<10;i++){
    const ang=Math.random()*TAU;
    const spd=0.9+Math.random()*3.2;
    particles.push({x:p.px,y:p.py,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      r:0.8+Math.random()*1.6,a:0.95,col:`${r},${g},${b}`,life:380+Math.random()*420});
  }
  if(particles.length>300)particles=particles.slice(-300);
}
function updateParticles(){
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;
    p.life-=16;p.a=Math.max(0,p.life/600);
  }
  particles=particles.filter(p=>p.a>0.01);
}
function drawParticles(){
  if(!particles.length)return;
  cx2.save();cx2.globalCompositeOperation='lighter';
  for(const p of particles){
    cx2.globalAlpha=p.a;
    cx2.fillStyle=`rgba(${p.col},0.9)`;
    cx2.beginPath();cx2.arc(p.x,p.y,p.r,0,TAU);cx2.fill();
  }
  cx2.globalAlpha=1;cx2.restore();
}

// ── Stats & Feed ───────────────────────────────────────────────────────────
// ~5.2M significant global attacks tracked per day (~60/sec, ~3,600/min)
const DAILY_RATE=5200000;
const PER_SEC=DAILY_RATE/86400;
function todayBase(){
  const n=new Date(),s=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  return Math.floor((n-s)/1000*PER_SEC);
}
let totalToday=todayBase();
function updateStats(){
  document.getElementById('sTotal').textContent=totalToday.toLocaleString();
  // Per-minute rate: realistic ~3,600 with ±4% jitter
  const pmBase=Math.round(PER_SEC*60);
  const pmJitter=Math.floor((Math.random()-.5)*pmBase*.08);
  document.getElementById('sPerMin').textContent=(pmBase+pmJitter).toLocaleString();
  // Active: time-of-day curve (peaks midday UTC) + noise
  const hr=new Date().getUTCHours();
  const tod=Math.round(260+Math.sin((hr-6)*Math.PI/12)*110);
  document.getElementById('sActive').textContent=(tod+Math.floor(Math.random()*60)).toLocaleString();
}
// Increment counter at real rate (~2.5s per tick)
setInterval(()=>{
  totalToday+=Math.round(PER_SEC*2.5*(0.92+Math.random()*.16));
  document.getElementById('sTotal').textContent=totalToday.toLocaleString();
},2500);
setInterval(updateStats,5000);

const feedEl=document.getElementById('feed');
function addFeed(arc){
  const el=document.createElement('div');el.className='fi';
  el.style.borderLeftColor=arc.color;
  el.innerHTML=`<div class="fi-dot" style="background:${arc.color}"></div><span class="fi-route">${arc.srcCity} → ${arc.dstCity}</span><span class="fi-type">${arc.name}</span>`;
  feedEl.prepend(el);
  while(feedEl.children.length>5)feedEl.removeChild(feedEl.lastChild);
}

// ── Drag / rotate (horizontal = lon0, vertical = lat0) ────────────────────
let rotVel=0.04,rotVelY=0,dragging=false,lastDX=0,lastDY=0;
function onDragStart(x,y){dragging=true;lastDX=x;lastDY=y;rotVel=0;rotVelY=0;}
function onDragMove(x,y){
  if(!dragging)return;
  lon0+=(x-lastDX)*0.28;
  lat0=Math.max(-75,Math.min(75,lat0-(y-lastDY)*0.28));
  lastDX=x;lastDY=y;
}
function onDragEnd(){dragging=false;}
cv.addEventListener('mousedown',e=>onDragStart(e.clientX,e.clientY));
cv.addEventListener('mousemove',e=>{if(dragging)onDragMove(e.clientX,e.clientY);});
cv.addEventListener('mouseup',onDragEnd);
cv.addEventListener('mouseleave',onDragEnd);
let lastTX=0,lastTY=0,lastTT=0;
cv.addEventListener('touchstart',e=>{
  const t=e.touches[0];onDragStart(t.clientX,t.clientY);
  lastTX=t.clientX;lastTY=t.clientY;lastTT=performance.now();e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  const t=e.touches[0],now=performance.now(),dt=now-lastTT+1;
  rotVel=(t.clientX-lastTX)/dt*14*0.28;
  rotVelY=-(t.clientY-lastTY)/dt*14*0.28;
  onDragMove(t.clientX,t.clientY);
  lastTX=t.clientX;lastTY=t.clientY;lastTT=now;e.preventDefault();
},{passive:false});
cv.addEventListener('touchend',onDragEnd);

// ── Render loop ────────────────────────────────────────────────────────────
function render(now){
  if(!dragging){
    rotVel+=(0.04-rotVel)*0.04;
    rotVelY*=0.92;
    lon0=(lon0+rotVel)%360;
    lat0=Math.max(-75,Math.min(75,lat0+rotVelY));
  }

  updateArcs(now);updateRings(now);updateParticles();

  cx2.clearRect(0,0,W,H);

  // Space background
  cx2.fillStyle='#000308';cx2.fillRect(0,0,W,H);
  // Nebula clouds
  const _n1=cx2.createRadialGradient(W*.18,H*.22,0,W*.18,H*.22,W*.44);
  _n1.addColorStop(0,'rgba(65,15,110,.22)');_n1.addColorStop(.5,'rgba(30,8,70,.09)');_n1.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=_n1;cx2.fillRect(0,0,W,H);
  const _n2=cx2.createRadialGradient(W*.82,H*.68,0,W*.82,H*.68,W*.5);
  _n2.addColorStop(0,'rgba(8,35,90,.24)');_n2.addColorStop(.5,'rgba(4,18,50,.1)');_n2.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=_n2;cx2.fillRect(0,0,W,H);
  const _n3=cx2.createRadialGradient(W*.5,H*.88,0,W*.5,H*.88,W*.38);
  _n3.addColorStop(0,'rgba(10,50,85,.15)');_n3.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=_n3;cx2.fillRect(0,0,W,H);
  // Milky Way band
  const _mw=cx2.createLinearGradient(W*.05,H*.9,W*.95,H*.1);
  _mw.addColorStop(0,'rgba(0,0,0,0)');_mw.addColorStop(.25,'rgba(22,32,62,.07)');_mw.addColorStop(.48,'rgba(45,55,95,.13)');_mw.addColorStop(.52,'rgba(45,55,95,.13)');_mw.addColorStop(.75,'rgba(22,32,62,.07)');_mw.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=_mw;cx2.fillRect(0,0,W,H);
  // Stars with twinkle
  for(const s of STARS){
    const tw=Math.sin(now*.001*s.tws+s.tw);
    cx2.globalAlpha=Math.max(.02,s.a*(.75+tw*.25));
    if(s.r>1.8){
      cx2.fillStyle=s.col;cx2.beginPath();cx2.arc(s.x*W,s.y*H,s.r,0,TAU);cx2.fill();
      cx2.globalAlpha*=.18;cx2.strokeStyle=s.col;cx2.lineWidth=.5;
      cx2.beginPath();cx2.moveTo(s.x*W-s.r*3.5,s.y*H);cx2.lineTo(s.x*W+s.r*3.5,s.y*H);cx2.moveTo(s.x*W,s.y*H-s.r*3.5);cx2.lineTo(s.x*W,s.y*H+s.r*3.5);cx2.stroke();
    }else{cx2.fillStyle=s.col;cx2.beginPath();cx2.arc(s.x*W,s.y*H,s.r,0,TAU);cx2.fill();}
  }
  cx2.globalAlpha=1;

  drawGlobe();

  cx2.save();cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.clip();
  drawCountries();
  drawGrid();
  drawScan(now);
  drawArcs();
  drawCities(now);
  drawRings();
  cx2.restore();

  drawParticles();

  // Edge ring + specular highlight
  cx2.save();
  cx2.shadowColor='rgba(0,180,255,0.75)';cx2.shadowBlur=28;
  cx2.strokeStyle='rgba(40,140,255,0.48)';cx2.lineWidth=1.8;
  cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.stroke();
  cx2.shadowBlur=0;
  cx2.strokeStyle='rgba(120,220,255,0.12)';cx2.lineWidth=0.6;
  cx2.beginPath();cx2.arc(W/2,H/2,R+0.8,0,TAU);cx2.stroke();
  cx2.restore();
  const spec=cx2.createRadialGradient(W/2-R*0.28,H/2-R*0.28,0,W/2-R*0.28,H/2-R*0.28,R*0.55);
  spec.addColorStop(0,'rgba(120,170,255,0.07)');spec.addColorStop(1,'rgba(0,0,0,0)');
  cx2.fillStyle=spec;cx2.beginPath();cx2.arc(W/2,H/2,R,0,TAU);cx2.fill();

  requestAnimationFrame(render);
}

// ── Init ───────────────────────────────────────────────────────────────────
function startSim(){
  const ld=document.getElementById('ld');
  ld.classList.add('hide');setTimeout(()=>ld.style.display='none',700);
  updateStats();
  for(let i=0;i<4;i++)setTimeout(spawnArc,i*320);
  function spawnLoop(){if(arcs.length<MAX_ARCS)spawnArc();setTimeout(spawnLoop,800+Math.random()*1200);}
  setTimeout(spawnLoop,1600);
}

requestAnimationFrame(render);
setTimeout(startSim,1500);
</script>
