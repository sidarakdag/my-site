<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, sans-serif;
    padding: 24px 20px 60px;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 20px;
    font-weight: 600;
  }
  label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin: 18px 0 6px;
  }
  input[type="text"], input[type="password"], input[type="file"] {
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
  }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 24px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:active { opacity: 0.7; }
  #status {
    margin-top: 16px;
    font-size: 13px;
    color: #aaa;
    white-space: pre-wrap;
  }
  .section {
    border-top: 1px solid #222;
    padding-top: 16px;
    margin-top: 24px;
  }
</style>
</head>
<body>

  <h1>kataly admin</h1>

  <label>GitHub Token (paste each time, never saved)</label>
  <input type="password" id="token" placeholder="github_pat_...">

  <div class="section">
    <label>Telegram link</label>
    <input type="text" id="telegram">

    <label>Discord link</label>
    <input type="text" id="discord">

    <label>Instagram link</label>
    <input type="text" id="instagram">
  </div>

  <div class="section">
    <label>Upload new background music (optional)</label>
    <input type="file" id="musicFile" accept="audio/*">
  </div>

  <button id="saveBtn">Save Changes</button>
  <div id="status"></div>

  <script>
    const OWNER = 'sidarakdag';
    const REPO = 'my-site';
    const BRANCH = 'main';

    const statusEl = document.getElementById('status');

    function log(msg) {
      statusEl.textContent += msg + '\n';
    }

    // Load current config to pre-fill the form
    async function loadConfig() {
      try {
        const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/config.json?t=${Date.now()}`);
        const config = await res.json();
        document.getElementById('telegram').value = config.telegram || '';
        document.getElementById('discord').value = config.discord || '';
        document.getElementById('instagram').value = config.instagram || '';
      } catch (e) {
        log('Could not load current config (might not exist yet) — that\'s OK, just fill in fresh values.');
      }
    }
    loadConfig();

    function getHeaders(token) {
      return {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json'
      };
    }

    async function getSha(token, path) {
      try {
        const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
          headers: getHeaders(token)
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data.sha;
      } catch (e) {
        return null;
      }
    }

    async function saveFile(token, path, base64Content, message) {
      const sha = await getSha(token, path);
      const body = {
        message,
        content: base64Content,
        branch: BRANCH
      };
      if (sha) body.sha = sha;

      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { ...getHeaders(token), 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'Unknown error');
      }
      return res.json();
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      statusEl.textContent = '';
      const token = document.getElementById('token').value.trim();
      if (!token) {
        log('⚠️ Paste your GitHub token first.');
        return;
      }

      const musicFileInput = document.getElementById('musicFile');
      const musicFile = musicFileInput.files[0];

      const config = {
        telegram: document.getElementById('telegram').value.trim(),
        discord: document.getElementById('discord').value.trim(),
        instagram: document.getElementById('instagram').value.trim(),
        music: 'music.mp3'
      };

      try {
        log('Saving config.json...');
        const configBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));
        await saveFile(token, 'config.json', configBase64, 'Update site config via admin panel');
        log('✅ Config saved.');

        if (musicFile) {
          log('Uploading new music file...');
          const musicBase64 = await fileToBase64(musicFile);
          await saveFile(token, 'music.mp3', musicBase64, 'Update background music via admin panel');
          log('✅ Music updated.');
        }

        log('\nAll done! Changes go live in about 30-60 seconds.');
      } catch (e) {
        log('❌ Error: ' + e.message);
        log('Double check your token has Contents: Read and write permission for this repo.');
      }
    });
  </script>

</body>
</html>
